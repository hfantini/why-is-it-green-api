services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_NUMBER: 1
        GIT_SHA: 7f3c9ab
    container_name: why-is-it-green-api
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
